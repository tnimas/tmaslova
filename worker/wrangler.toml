name = "tmaslova-leads"
main = "src/index.js"
compatibility_date = "2026-03-01"
workers_dev = true

[vars]
ALLOWED_ORIGINS = "https://www.psymaslova.ru,https://psymaslova.ru,http://localhost:5500,http://127.0.0.1:5500"
MAX_SUBMISSIONS_PER_PHONE_PER_DAY = "3"
MAX_SUBMISSIONS_PER_IP_PER_DAY = "20"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDO"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RateLimiterDO"]
